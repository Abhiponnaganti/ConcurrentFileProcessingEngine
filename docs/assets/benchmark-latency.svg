<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" role="img" aria-labelledby="title desc">
<title id="title">Chunk Latency Percentiles</title>
<desc id="desc">Median-run p50 p95 and p99 chunk latency for the 256 MiB benchmark fixture.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="110" y="38" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">Chunk Latency Percentiles</text>
<text x="110" y="62" font-family="Inter, Arial, sans-serif" font-size="13" fill="#5B677A">256 MiB generated fixture, 1 MiB chunks, median rows</text>
<line x1="110" y1="378" x2="850" y2="378" stroke="#D7DCE5"/>
<rect x="152.0" y="229.5" width="46" height="148.5" rx="3" fill="#5B677A"/>
<text x="175.0" y="222.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#172033">4.20</text>
<rect x="210.0" y="221.2" width="46" height="156.8" rx="3" fill="#2F80ED"/>
<text x="233.0" y="214.2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#172033">4.43</text>
<rect x="268.0" y="197.8" width="46" height="180.2" rx="3" fill="#219653"/>
<text x="291.0" y="190.8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#172033">5.10</text>
<text x="233.3" y="409" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#172033">fread single-thread</text>
<rect x="398.7" y="229.1" width="46" height="148.9" rx="3" fill="#5B677A"/>
<text x="421.7" y="222.1" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#172033">4.21</text>
<rect x="456.7" y="220.7" width="46" height="157.3" rx="3" fill="#2F80ED"/>
<text x="479.7" y="213.7" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#172033">4.45</text>
<rect x="514.7" y="136.3" width="46" height="241.7" rx="3" fill="#219653"/>
<text x="537.7" y="129.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#172033">6.83</text>
<text x="480.0" y="409" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#172033">mmap single-thread</text>
<rect x="645.3" y="219.7" width="46" height="158.3" rx="3" fill="#5B677A"/>
<text x="668.3" y="212.7" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#172033">4.48</text>
<rect x="703.3" y="208.7" width="46" height="169.3" rx="3" fill="#2F80ED"/>
<text x="726.3" y="201.7" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#172033">4.79</text>
<rect x="761.3" y="204.3" width="46" height="173.7" rx="3" fill="#219653"/>
<text x="784.3" y="197.3" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#172033">4.91</text>
<text x="726.7" y="409" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#172033">mmap thread pool</text>
<rect x="615" y="34" width="12" height="12" fill="#5B677A"/>
<text x="633" y="45" font-family="Inter, Arial, sans-serif" font-size="12" fill="#5B677A">p50</text>
<rect x="685" y="34" width="12" height="12" fill="#2F80ED"/>
<text x="703" y="45" font-family="Inter, Arial, sans-serif" font-size="12" fill="#5B677A">p95</text>
<rect x="755" y="34" width="12" height="12" fill="#219653"/>
<text x="773" y="45" font-family="Inter, Arial, sans-serif" font-size="12" fill="#5B677A">p99</text>
<text x="110" y="456" font-family="Inter, Arial, sans-serif" font-size="12" fill="#5B677A">Latency values are milliseconds per chunk.</text>
</svg>
